name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Checking index.html exists..."
          test -f index.html || (echo "ERROR: index.html not found" && exit 1)
          echo "Validating HTML syntax..."
          python3 - << 'PYEOF'
          from html.parser import HTMLParser
          import re, os, sys

          class Validator(HTMLParser):
              pass

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          Validator().feed(content)
          print(f"HTML syntax OK ({len(content):,} bytes)")

          # Check for broken local src references
          refs = re.findall(r'src=["\']([^"\']+)["\']', content)
          broken = [r for r in refs if not r.startswith(('http', 'data:')) and not os.path.exists(r)]
          if broken:
              print("WARNING: Missing local files referenced in src=: " + ", ".join(broken))
          else:
              print("All local src= references OK (or none present)")

          print("CI passed — vanilla HTML project validated successfully")
          PYEOF
