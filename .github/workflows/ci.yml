name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Checking index.html exists..."
          test -f index.html || (echo "ERROR: index.html not found" && exit 1)
          echo "Validating HTML syntax..."
          python3 -c "
          from html.parser import HTMLParser
          class Validator(HTMLParser):
              pass
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          Validator().feed(content)
          print('HTML syntax OK')
          print(f'File size: {len(content):,} bytes')
          "

      - name: Check for console errors in HTML
        run: |
          echo "Checking for common issues..."
          # Warn if there are broken local references
          grep -oP 'src=["\x27]\K[^"\']+' index.html | grep -v '^http' | grep -v '^data:' | while read ref; do
            if [ ! -f "$ref" ]; then
              echo "WARNING: referenced file not found: $ref"
            fi
          done
          echo "Done — CI passed for vanilla HTML project"
